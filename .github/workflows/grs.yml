name: Update README cards

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate cards
        run: |
          mkdir -p profile

          curl -s "https://github-readme-stats.vercel.app/api?username=mfaeezshabbir&show_icons=true&count_private=true&title_color=ffffff&text_color=ffffff&icon_color=ffffff&bg_color=000000&hide_border=true" -o profile/stats.svg

          curl -s "https://streak-stats.demolab.com?user=mfaeezshabbir&hide_border=true&background=000000&ring=ffffff&fire=ffffff&currStreakNum=ffffff&sideNums=ffffff&currStreakLabel=ffffff&sideLabels=888888&dates=888888&stroke=ffffff" -o profile/streak.svg

          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=mfaeezshabbir&hide=HTML&langs_count=10&layout=compact&title_color=ffffff&text_color=ffffff&bg_color=000000&hide_border=true&border_radius=2&size_weight=0.5&count_weight=0.5&exclude_repo=github-readme-stats" -o profile/top-langs.svg

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "chore: update README stat cards" || exit 0
          git push